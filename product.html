<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <script src="product.js" defer></script>
  </head>

  <body class="product">
    <header class="mainNav">
      <a href="index.html" class="logo">
        <img src="logo4.png" alt="FashionRUs logo" />
      </a>

      <nav>
        <a href="#">CATEGORIES</a>
        <a href="#">BRANDS</a>
        <a href="#">SEASONS</a>
      </nav>
    </header>

    <a href="productlist.html" class="backLink" id="backLink">BACK</a>

    <main id="productContainer">
      <figure>
        <img
          src=""
          alt=""
          class="productImage"
          loading="lazy"
          decoding="async"
          width="300"
          height="400"
        />
        <span class="saleLabel"></span>
      </figure>

      <section class="productDetails">
        <h2 class="productName"></h2>

        <div>
          <p class="articleType"></p>
          <p class="productCategory"></p>
          <p class="productPrice"></p>
          <p class="stock"></p>
        </div>

        <button class="buyButton">KØB NU</button>
      </section>
    </main>
  </body>
</html>

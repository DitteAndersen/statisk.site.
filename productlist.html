<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products By Category</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+SemiExpanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <script src="productlist.js" defer></script>
  </head>

  <body class="productlist">
    <header class="mainNav">
      <a href="index.html" class="logo">
        <img src="logo4.png" alt="FashionRUs logo" />
      </a>

      <nav>
        <a href="#">CATEGORIES</a>
        <a href="#">BRANDS</a>
        <a href="#">SEASONS</a>
      </nav>
    </header>

    <main>
      <h2></h2>

      <div class="filters">
        <button class="filterBtn isActive" data-gender="all">All</button>
        <button class="filterBtn" data-gender="men">Men</button>
        <button class="filterBtn" data-gender="women">Women</button>
        <button class="filterBtn" data-gender="unisex">Unisex</button>
      </div>

      <section class="productList"></section>
    </main>
  </body>
</html>
